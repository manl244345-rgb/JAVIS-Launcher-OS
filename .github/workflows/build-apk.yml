name: JAVIS V06 Ultimate - Build & Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3072m'

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '${{ env.JAVA_VERSION }}', distribution: 'temurin', cache: gradle }
      - run: chmod +x gradlew && ./gradlew lint --continue
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: lint-report, path: app/build/reports/lint-results*.html }

  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '${{ env.JAVA_VERSION }}', distribution: 'temurin', cache: gradle }
      - run: chmod +x gradlew && ./gradlew test
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results, path: app/build/reports/tests/ }

  build-debug:
    name: 🔨 Debug APK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '${{ env.JAVA_VERSION }}', distribution: 'temurin', cache: gradle }
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - run: chmod +x gradlew && ./gradlew assembleDebug --stacktrace
      - id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "size=$(du -sh $APK | cut -f1)" >> $GITHUB_OUTPUT
          ls -lh $APK
      - uses: actions/upload-artifact@v4
        with:
          name: JAVIS-V06-Debug
          path: app/build/outputs/apk/debug/
          retention-days: 30

  build-release:
    name: 📦 Release APK
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '${{ env.JAVA_VERSION }}', distribution: 'temurin', cache: gradle }
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - run: chmod +x gradlew && ./gradlew assembleRelease --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: JAVIS-V06-Release
          path: app/build/outputs/apk/release/
          retention-days: 90

  diagnose:
    name: 🩺 Diagnose
    runs-on: ubuntu-latest
    needs: build-debug
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: JAVIS-V06-Debug, path: apk/ }
      - uses: actions/setup-java@v4
        with: { java-version: '${{ env.JAVA_VERSION }}', distribution: 'temurin' }
      - uses: android-actions/setup-android@v3
      - name: Diagnose APK
        run: |
          APK=$(find apk -name "*.apk" | head -1)
          echo "=== APK ==="
          ls -lh "$APK"
          echo ""
          echo "=== Permissions ==="
          $ANDROID_HOME/build-tools/*/aapt dump permissions "$APK" 2>/dev/null || true
          echo ""
          echo "=== Badging ==="
          $ANDROID_HOME/build-tools/*/aapt dump badging "$APK" 2>/dev/null | head -20 || true
          echo ""
          echo "=== DEX files ==="
          unzip -l "$APK" | grep "\.dex" || true
          echo ""
          echo "=== Total size ==="
          unzip -l "$APK" | tail -3
      - name: Build report
        run: |
          APK=$(find apk -name "*.apk" | head -1)
          cat > report.md << MDEOF
          # JAVIS V06 Ultimate — Build Report
          **Date:** $(date)
          **SHA:** ${{ github.sha }}
          **APK size:** $(ls -lh "$APK" | awk '{print $5}')

          ## Architecture
          - Android AI Launcher (minSdk 26, targetSdk 34)
          - Room DB (8 tables: Memory, Conversation, Alarm, Apps, Log, Notifications, Voice, Tasks)
          - Multi-provider AI failover (OpenRouter → Groq → DeepSeek → Together → Fireworks)
          - Voice: Android TTS (deep male) + SpeechRecognizer (no popups)
          - Animated Skull Orb with 7 states
          - Swipe navigation (Up=Apps, Left=Chat, Right=Memory, Down=Mission Control)
          - 10 screens: Home, Chat, AllApps, Memory, MissionControl, Settings, Log, Alarm, ImageStudio, VideoStudio

          ## How to Install
          1. Enable "Install unknown apps" on Redmi A1
          2. Transfer APK via USB or download directly
          3. Install and set JAVIS as default launcher
          4. Open Settings → add your API key (OpenRouter recommended)
          5. Grant: Accessibility, Notification Listener, Microphone, Contacts
          MDEOF
          cat report.md
      - uses: actions/upload-artifact@v4
        with: { name: build-report, path: report.md }

  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: [ build-debug, build-release, diagnose ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: JAVIS-V06-Debug, path: assets/debug/ }
      - uses: actions/download-artifact@v4
        with: { name: JAVIS-V06-Release, path: assets/release/ }
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with: { name: build-report, path: assets/ }
        continue-on-error: true
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "🤖 JAVIS V06 Ultimate ${{ github.ref_name }}"
          body_path: assets/report.md
          draft: false
          prerelease: false
          files: |
            assets/debug/*.apk
            assets/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
